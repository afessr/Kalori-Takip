<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalori Takip</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  width: 80%;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
}

.delete { background: red; }
.reset { background: orange; }

li { margin: 10px 0; }
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Kalori Takip</h2>

  <input type="number" id="goal" placeholder="Günlük hedef (kcal)">
  <button onclick="setGoal()">Hedef Kaydet</button>

  <h3>🎯 Hedef: <span id="goalText">0</span> kcal</h3>
  <h3>📅 Bugün: <span id="today"></span></h3>

  <input type="text" id="food" placeholder="Yemek adı">
  <input type="number" id="calorie" placeholder="Kalori">

  <button onclick="addFood()">Ekle</button>

  <h3>Toplam: <span id="total">0</span> kcal</h3>
  <h3>Kalan: <span id="remaining">0</span> kcal</h3>

  <button class="reset" onclick="resetDay()">Bugünü Sıfırla</button>

  <ul id="list"></ul>
</div>

<div class="container">
  <h3>📊 Günlük Grafik</h3>
  <canvas id="chart"></canvas>
</div>

<div class="container">
  <h3>📈 Haftalık Analiz</h3>
  <p>Toplam: <span id="weekTotal">0</span> kcal</p>
  <p>Ortalama: <span id="weekAvg">0</span> kcal</p>
  <p>En yüksek gün: <span id="maxDay">-</span></p>
  <p>En düşük gün: <span id="minDay">-</span></p>
</div>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("today").innerText = today;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 2000;

if (!data[today]) {
  data[today] = { foods: [], total: 0 };
}

let foods = data[today].foods;
let total = data[today].total;

document.getElementById("goalText").innerText = goal;
document.getElementById("total").innerText = total;

function updateRemaining() {
  const remaining = goal - total;
  const el = document.getElementById("remaining");

  el.innerText = remaining;
  el.style.color = remaining < 0 ? "red" : "green";
}

let chart;

function renderChart() {
  const labels = Object.keys(data);
  const totals = labels.map(d => data[d].total);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Günlük Kalori",
        data: totals
      }]
    }
  });
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split("T")[0];
    days.push(key);
  }
  return days;
}

function renderWeekly() {
  const days = getLast7Days();
  const totals = days.map(d => data[d]?.total || 0);

  const sum = totals.reduce((a,b) => a+b, 0);
  const avg = Math.round(sum / 7);

  const max = Math.max(...totals);
  const min = Math.min(...totals);

  document.getElementById("weekTotal").innerText = sum;
  document.getElementById("weekAvg").innerText = avg;
  document.getElementById("maxDay").innerText = days[totals.indexOf(max)] + " (" + max + ")";
  document.getElementById("minDay").innerText = days[totals.indexOf(min)] + " (" + min + ")";
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  foods.forEach((f, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${f.name} - ${f.cal} kcal
      <button class="delete" onclick="deleteFood(${index})">Sil</button>
    `;

    list.appendChild(li);
  });

  renderChart();
  renderWeekly();
  updateRemaining();

  localStorage.setItem("data", JSON.stringify(data));
}

function addFood() {
  const name = document.getElementById("food").value;
  const cal = parseInt(document.getElementById("calorie").value);

  if (!name || !cal || cal <= 0) {
    alert("Doğru değer gir!");
    return;
  }

  foods.push({name, cal});
  total += cal;

  data[today] = { foods, total };

  document.getElementById("total").innerText = total;

  document.getElementById("food").value = "";
  document.getElementById("calorie").value = "";

  render();
}

function deleteFood(index) {
  total -= foods[index].cal;
  foods.splice(index, 1);

  data[today] = { foods, total };

  document.getElementById("total").innerText = total;

  render();
}

function resetDay() {
  if (confirm("Bugünün verileri silinsin mi?")) {
    foods = [];
    total = 0;

    data[today] = { foods, total };

    document.getElementById("total").innerText = 0;

    render();
  }
}

function setGoal() {
  const g = parseInt(document.getElementById("goal").value);

  if (!g || g <= 0) {
    alert("Geçerli hedef gir!");
    return;
  }

  goal = g;
  localStorage.setItem("goal", goal);

  document.getElementById("goalText").innerText = goal;

  render();
}

render();
</script>

</body>
</html>
