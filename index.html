<body>

<!-- Splash ekran -->
<div id="splash">
  <div class="spinner"></div>
  <p>Kalori Takip Pro</p>
</div>

<style>
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}
#splash p{
  color:#fff;
  margin-top:15px;
  font-size:20px;
  opacity:0.8;
}
.spinner{
  border:6px solid #1c1c1e;
  border-top:6px solid #0a84ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
.card{margin:10px;padding:10px;border:1px solid #ccc;border-radius:5px;}
input{margin:3px 2px;padding:3px;}
button{margin:3px 2px;padding:4px;}
.small-btn{padding:1px 4px;margin-left:5px;}
</style>

<h2>🔥 Kalori Takip Pro</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Yemek Ekle</h3>
<input id="food" placeholder="Yemek adı">
<input id="cal" type="number" placeholder="Kalori">
<input id="protein" type="number" placeholder="Protein">
<input id="carb" type="number" placeholder="Karbonhidrat">
<input id="fat" type="number" placeholder="Yağ">
<button onclick="addFood()">Ekle</button>
</div>

<!-- Hazır Yemekler -->
<div class="card">
<h3>⚡ Hazır Yemekler</h3>

<!-- 5 hazır yemek slotu -->
<input id="quickName1" placeholder="Yemek 1 adı">
<input id="quickCal1" type="number" placeholder="Kalori">
<input id="quickP1" type="number" placeholder="Protein">
<input id="quickC1" type="number" placeholder="Karbonhidrat">
<input id="quickF1" type="number" placeholder="Yağ">
<button onclick="quickAddCustom(1)">Ekle</button>

<input id="quickName2" placeholder="Yemek 2 adı">
<input id="quickCal2" type="number" placeholder="Kalori">
<input id="quickP2" type="number" placeholder="Protein">
<input id="quickC2" type="number" placeholder="Karbonhidrat">
<input id="quickF2" type="number" placeholder="Yağ">
<button onclick="quickAddCustom(2)">Ekle</button>

<input id="quickName3" placeholder="Yemek 3 adı">
<input id="quickCal3" type="number" placeholder="Kalori">
<input id="quickP3" type="number" placeholder="Protein">
<input id="quickC3" type="number" placeholder="Karbonhidrat">
<input id="quickF3" type="number" placeholder="Yağ">
<button onclick="quickAddCustom(3)">Ekle</button>

<input id="quickName4" placeholder="Yemek 4 adı">
<input id="quickCal4" type="number" placeholder="Kalori">
<input id="quickP4" type="number" placeholder="Protein">
<input id="quickC4" type="number" placeholder="Karbonhidrat">
<input id="quickF4" type="number" placeholder="Yağ">
<button onclick="quickAddCustom(4)">Ekle</button>

<input id="quickName5" placeholder="Yemek 5 adı">
<input id="quickCal5" type="number" placeholder="Kalori">
<input id="quickP5" type="number" placeholder="Protein">
<input id="quickC5" type="number" placeholder="Karbonhidrat">
<input id="quickF5" type="number" placeholder="Yağ">
<button onclick="quickAddCustom(5)">Ekle</button>

<br><button onclick="addAllQuick()">Tümünü Tek Tıkla Ekle</button>
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals"></p>
<p id="goalStatus"></p>
</div>

<div class="card">
<h3>OMAD Modu</h3>
<button onclick="toggleOMAD()">Aç / Kapat</button>
<p id="omadStatus"></p>
</div>

<div class="card">
<h3>Geçmiş</h3>
<select id="historySelect" onchange="loadDay()"></select>
</div>

<div class="card">
<ul id="list"></ul>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let todayDate = new Date().toISOString().split('T')[0];
today.innerText = "Bugün: " + todayDate;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 1800;
let omad = JSON.parse(localStorage.getItem("omad")) || false;
let currentDay = todayDate;
if(!data[currentDay]) data[currentDay]=[];

// Hazır yemekler
let quickMeals = JSON.parse(localStorage.getItem("quickMeals")) || [
  {name:"",cal:0,protein:0,carb:0,fat:0},
  {name:"",cal:0,protein:0,carb:0,fat:0},
  {name:"",cal:0,protein:0,carb:0,fat:0},
  {name:"",cal:0,protein:0,carb:0,fat:0},
  {name:"",cal:0,protein:0,carb:0,fat:0},
];

function loadQuickMeals(){
  quickMeals.forEach((m,i)=>{
    document.getElementById("quickName"+(i+1)).value = m.name;
    document.getElementById("quickCal"+(i+1)).value = m.cal;
    document.getElementById("quickP"+(i+1)).value = m.protein;
    document.getElementById("quickC"+(i+1)).value = m.carb;
    document.getElementById("quickF"+(i+1)).value = m.fat;
  });
}

function saveQuickMeals(){ localStorage.setItem("quickMeals", JSON.stringify(quickMeals)); }

function save(){ localStorage.setItem("data", JSON.stringify(data)); localStorage.setItem("omad", JSON.stringify(omad)); }

function addFood(){
  let item={name:food.value,cal:+cal.value,protein:+protein.value,carb:+carb.value,fat:+fat.value};
  data[currentDay].push(item);
  save();
  render();
}

function quickAddCustom(num){
  let name=document.getElementById("quickName"+num).value;
  let cal=+document.getElementById("quickCal"+num).value;
  let p=+document.getElementById("quickP"+num).value;
  let c=+document.getElementById("quickC"+num).value;
  let f=+document.getElementById("quickF"+num).value;

  if(name && !isNaN(cal)){
    data[currentDay].push({name:name, cal:cal, protein:p, carb:c, fat:f});
    quickMeals[num-1]={name:name,cal:cal,protein:p,carb:c,fat:f};
    saveQuickMeals();
    save();
    render();
  } else { alert("Yemek adı ve kalori girilmeli!"); }
}

// Tek tıkla tüm hazır yemekleri ekle
function addAllQuick(){
  quickMeals.forEach((m,i)=>{
    if(m.name && m.cal>0) data[currentDay].push({...m});
  });
  save();
  render();
}

function deleteFood(i){ data[currentDay].splice(i,1); save(); render(); }
function editFood(i){ let f=data[currentDay][i]; let n=prompt("Ad:",f.name); let c=prompt("Kalori:",f.cal); if(n!==null){ data[currentDay][i]={name:n,cal:+c,protein:f.protein,carb:f.carb,fat:f.fat}; save(); render(); } }
function toggleOMAD(){ omad=!omad; save(); render(); }
function loadDay(){ currentDay=historySelect.value; render(); }

function render(){
  list.innerHTML="";
  let foods=data[currentDay];
  let cal=0,p=0,c=0,f=0;
  foods.forEach((x,i)=>{
    list.innerHTML+=`<li>${x.name} (${x.cal} kcal)
      <button class="small-btn" onclick="editFood(${i})">✏️</button>
      <button class="small-btn" onclick="deleteFood(${i})">❌</button>
    </li>`;
    cal+=x.cal;p+=x.protein;c+=x.carb;f+=x.fat;
  });
  totals.innerHTML=`🔥 ${cal} kcal<br>🥩 ${p}g | 🍞 ${c}g | 🧈 ${f}g`;
  omadStatus.innerText= omad ? "OMAD aktif (tek öğün)" : "Normal mod";
  goalStatus.innerText=`Hedef: ${goal} | Kalan: ${goal-cal}`;
  updateHistory();
  drawChart(p,c,f);
}

function updateHistory(){
  historySelect.innerHTML="";
  Object.keys(data).forEach(d=>{ historySelect.innerHTML+=`<option>${d}</option>` });
  historySelect.value=currentDay;
}

function drawChart(p,c,f){
  new Chart(chart,{ type:'doughnut', data:{ labels:['Protein','Karbonhidrat','Yağ'], datasets:[{data:[p,c,f]}] } });
}

// Sayfa açılırken hazır yemekleri yükle
loadQuickMeals();

// Splash spinner
setTimeout(()=>{
  let s=document.getElementById("splash");
  s.style.opacity="0";
  s.style.transition="0.5s";
  setTimeout(()=>s.style.display="none",500);
},1500);

render();
</script>
</body>
