<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>OMAD Kalori Takip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>🔥 OMAD Kalori Takip</h1>

<input type="text" id="food" placeholder="Yemek adı">
<div id="suggestions" style="border:1px solid #ccc; margin-bottom:10px;"></div>

<input type="number" id="calorie" placeholder="Kalori">
<button onclick="addFood()">Ekle</button>

<ul id="list"></ul>

<h3>Toplam Kalori: <span id="total">0</span></h3>

<script>
let total = 0;

const suggestionsList = [
  "Tavuk + Pirinç",
  "Ton Balığı + Pirinç",
  "Yumurta + Lor",
  "Tavuk + Patates",
  "Lor + Yulaf"
];

document.getElementById("food").addEventListener("input", function() {
  const input = this.value.toLowerCase();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) return;

  const filtered = suggestionsList.filter(item =>
    item.toLowerCase().includes(input)
  );

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item;
    div.style.padding = "8px";
    div.style.cursor = "pointer";

    div.onclick = () => {
      document.getElementById("food").value = item;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
});

function addFood() {
  const food = document.getElementById("food").value;
  const calorie = parseInt(document.getElementById("calorie").value);

  if (!food || !calorie) return;

  const li = document.createElement("li");
  li.textContent = food + " - " + calorie + " kcal";
  document.getElementById("list").appendChild(li);

  total += calorie;
  document.getElementById("total").textContent = total;

  document.getElementById("food").value = "";
  document.getElementById("calorie").value = "";
  document.getElementById("suggestions").innerHTML = "";
}
</script>

</body>
</html>
