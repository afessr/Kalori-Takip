<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalori Takip</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  width: 80%;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Kalori Takip</h2>

  <input type="number" id="calorie" placeholder="Kalori gir">

  <button onclick="addCal()">Ekle</button>

  <h3>Toplam: <span id="total">0</span> kcal</h3>
</div>

<script>
let total = 0;

function addCal() {
  const cal = parseInt(document.getElementById("calorie").value);

  if (!cal) return;

  total += cal;
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
