<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kalori Takip Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f4f4f4;}
h2,h3{margin:5px 10px;}
.card{margin:10px;padding:10px;background:#fff;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
input, select, textarea{margin:3px 2px;padding:5px;}
button{margin:3px 2px;padding:6px 8px;border:none;border-radius:4px;background:#0a84ff;color:#fff;cursor:pointer;}
button:hover{opacity:0.9;}
.small-btn{padding:1px 4px;margin-left:5px;}
.highlight-high{background:#ffcccc;}
.highlight-carb{background:#ccffcc;}
.highlight-fat{background:#ccccff;}
.draggable{cursor:grab;padding:5px;border:1px solid #ddd;margin:3px;border-radius:4px;background:#fafafa;display:flex;flex-wrap:wrap;align-items:center;gap:4px;}
.favorite{color:gold;cursor:pointer;}
canvas{max-width:100%;height:300px !important;}
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#111;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:9999;}
#splash p{color:#fff;margin-top:15px;font-size:20px;opacity:0.8;}
.spinner{border:6px solid #1c1c1e;border-top:6px solid #0a84ff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="splash">
  <div class="spinner"></div>
  <p>Kalori Takip Pro</p>
</div>

<h2>🔥 Kalori Takip Pro</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Yemek Ekle</h3>
<input id="food" placeholder="Yemek adı">
<input id="cal" type="number" placeholder="Kalori">
<input id="protein" type="number" placeholder="Protein">
<input id="carb" type="number" placeholder="Karbonhidrat">
<input id="fat" type="number" placeholder="Yağ">
<select id="category">
  <option value="Kahvaltı">Kahvaltı</option>
  <option value="Öğle">Öğle</option>
  <option value="Akşam">Akşam</option>
  <option value="Ara Öğün">Ara Öğün</option>
</select>
<button onclick="addFood()">Ekle</button>
</div>

<div class="card">
<h3>⚡ Hazır Yemekler</h3>
<input id="searchQuick" placeholder="Ara..." oninput="renderQuickMeals()">
<select id="filterCategory" onchange="renderQuickMeals()">
  <option value="">Tümü</option>
  <option value="Kahvaltı">Kahvaltı</option>
  <option value="Öğle">Öğle</option>
  <option value="Akşam">Akşam</option>
  <option value="Ara Öğün">Ara Öğün</option>
</select>
<label><input type="checkbox" id="showFav" onchange="renderQuickMeals()"> Sadece Favori</label>
<div id="quickContainer"></div>
<button onclick="addAllQuick()">Tümünü Tek Tıkla Ekle</button>
<button onclick="exportQuick()">Export JSON</button>
<input type="file" id="importFile" onchange="importQuick(event)">
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals"></p>
<p id="goalStatus"></p>
</div>

<div class="card">
<h3>OMAD Modu</h3>
<button onclick="toggleOMAD()">Aç / Kapat</button>
<p id="omadStatus"></p>
</div>

<div class="card">
<h3>Geçmiş</h3>
<select id="historySelect" onchange="loadDay()"></select>
</div>

<div class="card">
<h3>Günlük Grafik</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Aylık Toplam</h3>
<select id="monthSelect" onchange="renderMonthly()"></select>
<p id="monthlyTotals"></p>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h3>Haftalık Rapor</h3>
<select id="weekSelect" onchange="renderWeekly()"></select>
<p id="weeklyTotals"></p>
<canvas id="weeklyChart"></canvas>
<canvas id="weeklyTrend"></canvas>
</div>

<script>
// --- Genel Tanımlar ---
let todayDate = new Date().toISOString().split('T')[0];
document.getElementById("today").innerText = "Bugün: " + todayDate;
let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 1800;
let omad = JSON.parse(localStorage.getItem("omad")) || false;
let currentDay = todayDate;
if(!data[currentDay]) data[currentDay]=[];

let quickMeals = JSON.parse(localStorage.getItem("quickMeals")) || [
  {name:"Tavuk + Pirinç",cal:500,protein:40,carb:50,fat:10, note:"Izgara", favorite:false, category:"Öğle"},
  {name:"Ton Balığı Salata",cal:350,protein:35,carb:10,fat:15, note:"Az tuzlu", favorite:true, category:"Öğle"},
  {name:"Yumurta + Lor",cal:300,protein:25,carb:5,fat:15, note:"", favorite:false, category:"Kahvaltı"},
  {name:"Lor Peynirli Sandviç",cal:400,protein:30,carb:35,fat:12, note:"Tam buğday ekmek", favorite:false, category:"Kahvaltı"},
  {name:"Badem + Yoğurt",cal:250,protein:15,carb:10,fat:18, note:"", favorite:false, category:"Ara Öğün"},
];

function saveQuickMeals(){ localStorage.setItem("quickMeals", JSON.stringify(quickMeals)); }
function save(){ localStorage.setItem("data", JSON.stringify(data)); localStorage.setItem("omad", JSON.stringify(omad)); }

// --- Quick Meals ---
function renderQuickMeals(){
  let container=document.getElementById("quickContainer");
  container.innerHTML="";
  let filter=document.getElementById("searchQuick").value.toLowerCase();
  let showFav=document.getElementById("showFav").checked;
  let categoryFilter=document.getElementById("filterCategory").value;
  quickMeals.forEach((m,i)=>{
    if(filter && !m.name.toLowerCase().includes(filter)) return;
    if(showFav && !m.favorite) return;
    if(categoryFilter && m.category!==categoryFilter) return;
    let div=document.createElement("div");
    div.className="draggable";
    div.innerHTML=`
      <span class="favorite ${m.favorite?'favorite':''}" onclick="toggleFavorite(${i})">★</span>
      <input id="qName${i}" value="${m.name}" placeholder="Ad">
      <input id="qCal${i}" type="number" value="${m.cal}" style="width:60px">
      <input id="qP${i}" type="number" value="${m.protein}" style="width:50px">
      <input id="qC${i}" type="number" value="${m.carb}" style="width:50px">
      <input id="qF${i}" type="number" value="${m.fat}" style="width:50px">
      <select id="qPortion${i}">
        <option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
      <input id="qNote${i}" placeholder="Not" value="${m.note}">
      <select id="qCategory${i}">
        <option value="Kahvaltı" ${m.category==="Kahvaltı"?"selected":""}>Kahvaltı</option>
        <option value="Öğle" ${m.category==="Öğle"?"selected":""}>Öğle</option>
        <option value="Akşam" ${m.category==="Akşam"?"selected":""}>Akşam</option>
        <option value="Ara Öğün" ${m.category==="Ara Öğün"?"selected":""}>Ara Öğün</option>
      </select>
      <button onclick="saveQuick(${i})">💾</button>
      <button onclick="quickAdd(${i})">➕</button>
      <button onclick="duplicateQuick(${i})">⎘</button>
      <button onclick="deleteQuick(${i})">❌</button>
    `;
    container.appendChild(div);
  });
}

// --- Splash ---
setTimeout(()=>{ let s=document.getElementById("splash"); s.style.opacity="0"; s.style.transition="0.5s"; setTimeout(()=>s.style.display="none",500); },1500);

// --- Buraya diğer tüm fonksiyonlar ve grafikler entegre edilecek ---
renderQuickMeals();
</script>

</body>
</html>
