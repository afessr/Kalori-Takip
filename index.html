<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kalori Takip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
</head>
<body>

<h2>Kalori Takip</h2>
<h3 id="today"></h3>

<input id="food" placeholder="Yemek adı"><br><br>
<input id="cal" type="number" placeholder="Kalori"><br><br>
<input id="protein" type="number" placeholder="Protein"><br><br>
<input id="carb" type="number" placeholder="Karbonhidrat"><br><br>
<input id="fat" type="number" placeholder="Yağ"><br><br>

<button onclick="addFood()">Ekle</button>

<h3>Toplam</h3>
<p id="totals"></p>

<h3>Hedef</h3>
<input id="goalInput" type="number" placeholder="Kalori hedefi">
<button onclick="setGoal()">Kaydet</button>
<p id="goalStatus"></p>

<h3>Geçmiş Günler</h3>
<select id="historySelect" onchange="loadDay()"></select>

<ul id="list"></ul>

<canvas id="chart" width="300" height="300"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let todayDate = new Date().toISOString().split('T')[0];
document.getElementById("today").innerText = "Bugün: " + todayDate;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 2000;
let currentDay = todayDate;

if(!data[currentDay]) data[currentDay] = [];

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function addFood(){
  let item = {
    name: food.value,
    cal: +cal.value,
    protein: +protein.value,
    carb: +carb.value,
    fat: +fat.value
  };

  data[currentDay].push(item);
  save();
  render();
}

function deleteFood(index){
  data[currentDay].splice(index,1);
  save();
  render();
}

function editFood(index){
  let f = data[currentDay][index];

  let newName = prompt("Yemek adı:", f.name);
  let newCal = prompt("Kalori:", f.cal);
  let newP = prompt("Protein:", f.protein);
  let newC = prompt("Karbonhidrat:", f.carb);
  let newF = prompt("Yağ:", f.fat);

  if(newName !== null){
    data[currentDay][index] = {
      name: newName,
      cal: +newCal,
      protein: +newP,
      carb: +newC,
      fat: +newF
    };
    save();
    render();
  }
}

function setGoal(){
  goal = goalInput.value;
  localStorage.setItem("goal", goal);
  render();
}

function loadDay(){
  currentDay = historySelect.value;
  render();
}

function render(){
  list.innerHTML = "";

  let foods = data[currentDay] || [];
  let totalCal=0, totalP=0, totalC=0, totalF=0;

  foods.forEach((f,i)=>{
    list.innerHTML += `
    <li>
      ${f.name} - ${f.cal} kcal 
      <button onclick="editFood(${i})">✏️</button>
      <button onclick="deleteFood(${i})">❌</button>
    </li>`;
    
    totalCal += f.cal;
    totalP += f.protein;
    totalC += f.carb;
    totalF += f.fat;
  });

  totals.innerHTML = `
  Kalori: ${totalCal}<br>
  Protein: ${totalP}g<br>
  Karbonhidrat: ${totalC}g<br>
  Yağ: ${totalF}g`;

  goalStatus.innerText = `Hedef: ${goal} | Kalan: ${goal-totalCal}`;

  updateHistory();
  drawChart(totalP,totalC,totalF);
}

function updateHistory(){
  historySelect.innerHTML = "";
  Object.keys(data).forEach(date=>{
    historySelect.innerHTML += `<option value="${date}">${date}</option>`;
  });
  historySelect.value = currentDay;
}

function drawChart(p,c,f){
  new Chart(document.getElementById("chart"), {
    type:'pie',
    data:{
      labels:['Protein','Karbonhidrat','Yağ'],
      datasets:[{data:[p,c,f]}]
    }
  });
}

render();
</script>

</body>
</html>
