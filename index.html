<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalori Takip Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

.delete {
  background: red;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Kalori Takip Pro</h1>

<input type="text" id="food" placeholder="Yemek">
<input type="number" id="cal" placeholder="Kalori">
<br>

<button onclick="add()">Ekle</button>

<h3>🎯 Hedef: <input type="number" id="goal" placeholder="2000"></h3>

<h2 id="total">Toplam: 0 kcal</h2>

<canvas id="chart"></canvas>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];
let goal = localStorage.getItem("goal") || 2000;

document.getElementById("goal").value = goal;

function save() {
  localStorage.setItem("data", JSON.stringify(data));
  localStorage.setItem("goal", goal);
}

function add() {
  let food = document.getElementById("food").value;
  let cal = parseInt(document.getElementById("cal").value);

  if (!food || !cal) return;

  data.push({food, cal});
  save();
  render();
}

function del(i) {
  data.splice(i, 1);
  save();
  render();
}

document.getElementById("goal").oninput = function() {
  goal = this.value;
  save();
  render();
};

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  data.forEach((item, i) => {
    total += item.cal;

    list.innerHTML += `
      <div class="card">
        ${item.food} - ${item.cal} kcal
        <button class="delete" onclick="del(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Toplam: " + total + " kcal";

  drawChart(total);
}

let chart;

function drawChart(total) {
  let ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Alınan", "Kalan"],
      datasets: [{
        data: [total, goal - total]
      }]
    }
  });
}

render();
</script>

</body>
</html>
