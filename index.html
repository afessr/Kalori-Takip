<body>

<!-- Splash ekran -->
<div id="splash">
  <div class="spinner"></div>
  <p>Kalori Takip Pro</p>
</div>

<style>
body{font-family:sans-serif;}
#splash{position:fixed;top:0;left:0;width:100%;height:100%;
background:#111;display:flex;justify-content:center;align-items:center;
flex-direction:column;z-index:9999;}
#splash p{color:#fff;margin-top:15px;font-size:20px;opacity:0.8;}
.spinner{border:6px solid #1c1c1e;border-top:6px solid #0a84ff;
border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{0% { transform: rotate(0deg);}100% { transform: rotate(360deg);}}
.card{margin:10px;padding:10px;border:1px solid #ccc;border-radius:5px;}
input, select, textarea{margin:3px 2px;padding:3px;}
button{margin:3px 2px;padding:4px;}
.small-btn{padding:1px 4px;margin-left:5px;}
.highlight-high{background:#ffcccc;}
.draggable{cursor:grab;}
.favorite{color:gold;}
</style>

<h2>🔥 Kalori Takip Pro</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Yemek Ekle</h3>
<input id="food" placeholder="Yemek adı">
<input id="cal" type="number" placeholder="Kalori">
<input id="protein" type="number" placeholder="Protein">
<input id="carb" type="number" placeholder="Karbonhidrat">
<input id="fat" type="number" placeholder="Yağ">
<button onclick="addFood()">Ekle</button>
</div>

<div class="card">
<h3>⚡ Hazır Yemekler Paneli</h3>
<input id="searchQuick" placeholder="Ara..." oninput="renderQuickMeals()">
<label><input type="checkbox" id="showFav" onchange="renderQuickMeals()"> Sadece Favori</label>
<div id="quickContainer"></div>
<button onclick="addAllQuick()">Tümünü Tek Tıkla Ekle</button>
<button onclick="exportQuick()">Export JSON</button>
<input type="file" id="importFile" onchange="importQuick(event)">
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals"></p>
<p id="goalStatus"></p>
</div>

<div class="card">
<h3>OMAD Modu</h3>
<button onclick="toggleOMAD()">Aç / Kapat</button>
<p id="omadStatus"></p>
</div>

<div class="card">
<h3>Geçmiş</h3>
<select id="historySelect" onchange="loadDay()"></select>
</div>

<div class="card">
<ul id="list"></ul>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let todayDate = new Date().toISOString().split('T')[0];
today.innerText = "Bugün: " + todayDate;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 1800;
let omad = JSON.parse(localStorage.getItem("omad")) || false;
let currentDay = todayDate;
if(!data[currentDay]) data[currentDay]=[];

let quickMeals = JSON.parse(localStorage.getItem("quickMeals")) || [
  {name:"Tavuk + Pirinç",cal:500,protein:40,carb:50,fat:10, note:"Izgara", favorite:false},
  {name:"Ton Balığı Salata",cal:350,protein:35,carb:10,fat:15, note:"Az tuzlu", favorite:true},
  {name:"Yumurta + Lor",cal:300,protein:25,carb:5,fat:15, note:"", favorite:false},
  {name:"Lor Peynirli Sandviç",cal:400,protein:30,carb:35,fat:12, note:"Tam buğday ekmek", favorite:false},
  {name:"Badem + Yoğurt",cal:250,protein:15,carb:10,fat:18, note:"", favorite:false},
];

function saveQuickMeals(){ localStorage.setItem("quickMeals", JSON.stringify(quickMeals)); }
function save(){ localStorage.setItem("data", JSON.stringify(data)); localStorage.setItem("omad", JSON.stringify(omad)); }

function renderQuickMeals(){
  let container=document.getElementById("quickContainer");
  container.innerHTML="";
  let filter=document.getElementById("searchQuick").value.toLowerCase();
  let showFav=document.getElementById("showFav").checked;
  quickMeals.forEach((m,i)=>{
    if(filter && !m.name.toLowerCase().includes(filter)) return;
    if(showFav && !m.favorite) return;
    let highProtein=m.protein>50?"highlight-high":"";
    container.innerHTML+=`
      <div class="draggable ${highProtein}" draggable="true" ondragstart="dragStart(event,${i})">
        <span style="cursor:pointer;" onclick="toggleFavorite(${i})" class="${m.favorite?'favorite':''}">★</span>
        <input id="qName${i}" value="${m.name}" placeholder="Ad">
        <input id="qCal${i}" type="number" value="${m.cal}" style="width:60px">
        <input id="qP${i}" type="number" value="${m.protein}" style="width:50px">
        <input id="qC${i}" type="number" value="${m.carb}" style="width:50px">
        <input id="qF${i}" type="number" value="${m.fat}" style="width:50px">
        <select id="qPortion${i}">
          <option value="0.25">0.25x</option>
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <input id="qNote${i}" placeholder="Not" value="${m.note}">
        <button onclick="saveQuick(${i})">💾</button>
        <button onclick="quickAdd(${i})">➕</button>
        <button onclick="deleteQuick(${i})">❌</button>
      </div>
    `;
  });
}

function toggleFavorite(i){
  quickMeals[i].favorite=!quickMeals[i].favorite;
  saveQuickMeals(); renderQuickMeals();
}

function saveQuick(i){
  let name=document.getElementById("qName"+i).value;
  let cal=+document.getElementById("qCal"+i).value;
  let p=+document.getElementById("qP"+i).value;
  let c=+document.getElementById("qC"+i).value;
  let f=+document.getElementById("qF"+i).value;
  let note=document.getElementById("qNote"+i).value;
  quickMeals[i]={name:name,cal:cal,protein:p,carb:c,fat:f,note:note,favorite:quickMeals[i].favorite};
  saveQuickMeals();
  renderQuickMeals();
}

function quickAdd(i){
  let m=quickMeals[i];
  let portion=+document.getElementById("qPortion"+i).value;
  data[currentDay].push({name:m.name,cal:m.cal*portion,protein:m.protein*portion,carb:m.carb*portion,fat:m.fat*portion});
  save(); render();
}

function deleteQuick(i){ quickMeals.splice(i,1); saveQuickMeals(); renderQuickMeals(); }
function addAllQuick(){ quickMeals.forEach((m,i)=>quickAdd(i)); }

function exportQuick(){
  let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(quickMeals));
  let dlAnchorElem = document.createElement('a');
  dlAnchorElem.setAttribute("href", dataStr);
  dlAnchorElem.setAttribute("download","quickMeals.json");
  dlAnchorElem.click();
}

function importQuick(e){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=function(evt){
    quickMeals=JSON.parse(evt.target.result);
    saveQuickMeals(); renderQuickMeals();
  };
  reader.readAsText(file);
}

// Yemek ekleme ve günlük liste
function addFood(){
  let item={name:food.value,cal:+cal.value,protein:+protein.value,carb:+carb.value,fat:+fat.value};
  data[currentDay].push(item);
  save(); render();
}
function deleteFood(i){ data[currentDay].splice(i,1); save(); render(); }
function editFood(i){ let f=data[currentDay][i]; let n=prompt("Ad:",f.name); let c=prompt("Kalori:",f.cal); if(n!==null){ data[currentDay][i]={name:n,cal:+c,protein:f.protein,carb:f.carb,fat:f.fat}; save(); render(); } }
function toggleOMAD(){ omad=!omad; save(); render(); }
function loadDay(){ currentDay=historySelect.value; render(); }

function render(){
  list.innerHTML="";
  let foods=data[currentDay];
  let cal=0,p=0,c=0,f=0;
  foods.forEach((x,i)=>{
    list.innerHTML+=`<li>${x.name} (${x.cal} kcal)
      <button class="small-btn" onclick="editFood(${i})">✏️</button>
      <button class="small-btn" onclick="deleteFood(${i})">❌</button>
    </li>`;
    cal+=x.cal;p+=x.protein;c+=x.carb;f+=x.fat;
  });
  totals.innerHTML=`🔥 ${cal} kcal<br>🥩 ${p}g | 🍞 ${c}g | 🧈 ${f}g`;
  omadStatus.innerText= omad ? "OMAD aktif (tek öğün)" : "Normal mod";
  goalStatus.innerText=`Hedef: ${goal} | Kalan: ${goal-cal}`;
  updateHistory();
  drawChart(p,c,f);
}

function updateHistory(){
  historySelect.innerHTML="";
  Object.keys(data).forEach(d=>{ historySelect.innerHTML+=`<option>${d}</option>` });
  historySelect.value=currentDay;
}

function drawChart(p,c,f){
  new Chart(chart,{ type:'doughnut', data:{ labels:['Protein','Karbonhidrat','Yağ'], datasets:[{data:[p,c,f]}] } });
}

// Drag-drop sıralama altyapısı
let dragSrcIndex=null;
function dragStart(e,i){ dragSrcIndex=i; }
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", e => {
  if(dragSrcIndex===null) return;
  let container=document.getElementById("quickContainer");
  let dropTarget = e.target.closest(".draggable");
  if(!dropTarget) return;
  let allDivs=[...container.querySelectorAll(".draggable")];
  let dropIndex=allDivs.indexOf(dropTarget);
  if(dropIndex===-1) return;
  let temp=quickMeals[dragSrcIndex];
  quickMeals.splice(dragSrcIndex,1);
  quickMeals.splice(dropIndex,0,temp);
  saveQuickMeals(); renderQuickMeals();
  dragSrcIndex=null;
});

// Splash spinner
setTimeout(()=>{
  let s=document.getElementById("splash");
  s.style.opacity="0";
  s.style.transition="0.5s";
  setTimeout(()=>s.style.display="none",500);
},1500);

renderQuickMeals();
render();
</script>
</body>
