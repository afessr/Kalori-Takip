<body>

<!-- Splash ekran -->
<div id="splash">
  <div class="spinner"></div>
  <p>Kalori Takip Pro</p>
</div>

<style>
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}
#splash p{
  color:#fff;
  margin-top:15px;
  font-size:20px;
  opacity:0.8;
}
.spinner{
  border:6px solid #1c1c1e;
  border-top:6px solid #0a84ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
.card{margin:10px;padding:10px;border:1px solid #ccc;border-radius:5px;}
input{margin:3px 2px;padding:3px;}
button{margin:3px 2px;padding:4px;}
.small-btn{padding:1px 4px;margin-left:5px;}
</style>

<h2>🔥 Kalori Takip Pro</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Yemek Ekle</h3>
<input id="food" placeholder="Yemek adı">
<input id="cal" type="number" placeholder="Kalori">
<input id="protein" type="number" placeholder="Protein">
<input id="carb" type="number" placeholder="Karbonhidrat">
<input id="fat" type="number" placeholder="Yağ">
<button onclick="addFood()">Ekle</button>
</div>

<!-- Hazır Yemekler -->
<div class="card">
<h3>⚡ Hazır Yemekler</h3>
<div id="quickContainer"></div>
<button onclick="addAllQuick()">Tümünü Tek Tıkla Ekle</button>
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals"></p>
<p id="goalStatus"></p>
</div>

<div class="card">
<h3>OMAD Modu</h3>
<button onclick="toggleOMAD()">Aç / Kapat</button>
<p id="omadStatus"></p>
</div>

<div class="card">
<h3>Geçmiş</h3>
<select id="historySelect" onchange="loadDay()"></select>
</div>

<div class="card">
<ul id="list"></ul>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let todayDate = new Date().toISOString().split('T')[0];
today.innerText = "Bugün: " + todayDate;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 1800;
let omad = JSON.parse(localStorage.getItem("omad")) || false;
let currentDay = todayDate;
if(!data[currentDay]) data[currentDay]=[];

// Hazır yemekler localStorage
let quickMeals = JSON.parse(localStorage.getItem("quickMeals")) || [
  {name:"Tavuk + Pirinç",cal:500,protein:40,carb:50,fat:10},
  {name:"Ton Balığı Salata",cal:350,protein:35,carb:10,fat:15},
  {name:"Yumurta + Lor",cal:300,protein:25,carb:5,fat:15},
  {name:"Lor Peynirli Sandviç",cal:400,protein:30,carb:35,fat:12},
  {name:"Badem + Yoğurt",cal:250,protein:15,carb:10,fat:18},
];

function saveQuickMeals(){ localStorage.setItem("quickMeals", JSON.stringify(quickMeals)); }
function save(){ localStorage.setItem("data", JSON.stringify(data)); localStorage.setItem("omad", JSON.stringify(omad)); }

// Hazır yemekleri göster ve editable yap
function renderQuickMeals(){
  quickContainer.innerHTML="";
  quickMeals.forEach((m,i)=>{
    quickContainer.innerHTML+=`
      <div style="margin-bottom:5px;">
        <input id="qName${i}" value="${m.name}">
        <input id="qCal${i}" type="number" value="${m.cal}" style="width:60px">
        <input id="qP${i}" type="number" value="${m.protein}" style="width:50px">
        <input id="qC${i}" type="number" value="${m.carb}" style="width:50px">
        <input id="qF${i}" type="number" value="${m.fat}" style="width:50px">
        <button onclick="saveQuick(${i})">💾 Kaydet</button>
        <button onclick="quickAdd(${i})">➕ Ekle</button>
      </div>
    `;
  });
}

// Kaydet
function saveQuick(i){
  let name=document.getElementById("qName"+i).value;
  let cal=+document.getElementById("qCal"+i).value;
  let p=+document.getElementById("qP"+i).value;
  let c=+document.getElementById("qC"+i).value;
  let f=+document.getElementById("qF"+i).value;
  quickMeals[i]={name:name,cal:cal,protein:p,carb:c,fat:f};
  saveQuickMeals();
  renderQuickMeals();
}

// Tek tıkla ekle
function quickAdd(i){
  let m=quickMeals[i];
  if(m.name && !isNaN(m.cal)) {
    data[currentDay].push({...m});
    save(); render();
  }
}

// Tümünü tek tıkla ekle
function addAllQuick(){
  quickMeals.forEach(m=>{
    if(m.name && !isNaN(m.cal)) data[currentDay].push({...m});
  });
  save(); render();
}

function addFood(){
  let item={name:food.value,cal:+cal.value,protein:+protein.value,carb:+carb.value,fat:+fat.value};
  data[currentDay].push(item);
  save(); render();
}

function deleteFood(i){ data[currentDay].splice(i,1); save(); render(); }
function editFood(i){ let f=data[currentDay][i]; let n=prompt("Ad:",f.name); let c=prompt("Kalori:",f.cal); if(n!==null){ data[currentDay][i]={name:n,cal:+c,protein:f.protein,carb:f.carb,fat:f.fat}; save(); render(); } }
function toggleOMAD(){ omad=!omad; save(); render(); }
function loadDay(){ currentDay=historySelect.value; render(); }

function render(){
  list.innerHTML="";
  let foods=data[currentDay];
  let cal=0,p=0,c=0,f=0;
  foods.forEach((x,i)=>{
    list.innerHTML+=`<li>${x.name} (${x.cal} kcal)
      <button class="small-btn" onclick="editFood(${i})">✏️</button>
      <button class="small-btn" onclick="deleteFood(${i})">❌</button>
    </li>`;
    cal+=x.cal;p+=x.protein;c+=x.carb;f+=x.fat;
  });
  totals.innerHTML=`🔥 ${cal} kcal<br>🥩 ${p}g | 🍞 ${c}g | 🧈 ${f}g`;
  omadStatus.innerText= omad ? "OMAD aktif (tek öğün)" : "Normal mod";
  goalStatus.innerText=`Hedef: ${goal} | Kalan: ${goal-cal}`;
  updateHistory();
  drawChart(p,c,f);
}

function updateHistory(){
  historySelect.innerHTML="";
  Object.keys(data).forEach(d=>{ historySelect.innerHTML+=`<option>${d}</option>` });
  historySelect.value=currentDay;
}

function drawChart(p,c,f){
  new Chart(chart,{ type:'doughnut', data:{ labels:['Protein','Karbonhidrat','Yağ'], datasets:[{data:[p,c,f]}] } });
}

// Sayfa açılırken hazır yemekleri yükle
renderQuickMeals();

// Splash spinner
setTimeout(()=>{
  let s=document.getElementById("splash");
  s.style.opacity="0";
  s.style.transition="0.5s";
  setTimeout(()=>s.style.display="none",500);
},1500);

render();
</script>
</body>
