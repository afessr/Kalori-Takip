<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMAD ULTRA PRO</title>

<style>
body { margin:0; font-family:sans-serif; background:#0f0f0f; color:#fff; }
.container { padding:15px; }

.tabs { display:flex; background:#1a1a1a; }
.tab { flex:1; text-align:center; padding:10px; cursor:pointer; }
.active { background:#00c853; color:#000; }

input {
  width:100%; padding:10px; margin:5px 0;
  border:none; border-radius:8px;
}

button {
  padding:10px; border:none; border-radius:8px;
  margin:4px; cursor:pointer;
}

.add { background:#00c853; }
.fav { background:#ffd600; color:#000; }
.del { background:#ff1744; color:#fff; }

.card {
  background:#1c1c1c;
  padding:10px; margin:5px 0;
  border-radius:10px;
}

.progress {
  height:10px; background:#333;
  border-radius:10px; overflow:hidden;
}
.bar {
  height:10px; background:#00c853;
  width:0%;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home', event)">🏠 Ana</div>
  <div class="tab" onclick="showTab('fav', event)">⭐ Favori</div>
  <div class="tab" onclick="showTab('history', event)">📅 Geçmiş</div>
</div>

<div class="container">

<div id="home">
<input id="food" placeholder="Yemek adı">
<input id="grams" placeholder="Gram">
<input id="cal" placeholder="Kalori">
<input id="protein" placeholder="Protein">
<input id="carb" placeholder="Karbonhidrat">
<input id="fat" placeholder="Yağ">

<button class="add" onclick="addFood()">Ekle</button>
<button class="fav" onclick="saveToFavorites()">⭐ Favori</button>

<h3>🔥 Günlük Toplam</h3>
<div id="total"></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="foodList"></div>
</div>

<div id="fav" style="display:none">
<h3>⭐ Favoriler</h3>
<div id="favList"></div>
</div>

<div id="history" style="display:none">
<h3>📅 Geçmiş</h3>
<div id="historyList"></div>
</div>

</div>

<script>

var today = new Date().toISOString().slice(0,10);

var foods = JSON.parse(localStorage.getItem("foods_"+today) || "[]");
var favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

function showTab(tab, e) {
  document.getElementById("home").style.display="none";
  document.getElementById("fav").style.display="none";
  document.getElementById("history").style.display="none";

  document.getElementById(tab).style.display="block";

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");

  renderAll();
}

function addFood() {
  var f = {
    id:Date.now(),
    name:food.value,
    grams:+grams.value,
    cal:+cal.value,
    protein:+protein.value,
    carb:+carb.value,
    fat:+fat.value
  };

  if (!f.name || !f.grams) return alert("Eksik bilgi");

  foods.push(f);
  saveFoods();
  renderAll();
}

function saveToFavorites() {
  if (!food.value) return alert("Yemek gir");

  favorites.push({
    id:Date.now(),
    name:food.value,
    grams:+grams.value || 100,
    cal:+cal.value || 0,
    protein:+protein.value || 0,
    carb:+carb.value || 0,
    fat:+fat.value || 0
  });

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderFav();
}

function deleteFavorite(id) {
  if (!confirm("Silinsin mi?")) return;

  favorites = favorites.filter(f=>f.id!==id);
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderFav();
}

function selectFav(f) {
  food.value=f.name;
  grams.value=f.grams;
  cal.value=f.cal;
  protein.value=f.protein;
  carb.value=f.carb;
  fat.value=f.fat;
}

function saveFoods() {
  localStorage.setItem("foods_"+today, JSON.stringify(foods));
}

function renderFoods() {
  foodList.innerHTML="";
  foods.forEach(f=>{
    var div=document.createElement("div");
    div.className="card";
    div.textContent=`${f.name} - ${f.grams}g (${f.cal} kcal)`;
    foodList.appendChild(div);
  });
}

function renderTotal() {
  var t={cal:0,protein:0,carb:0,fat:0};

  foods.forEach(f=>{
    t.cal+=f.cal;
    t.protein+=f.protein;
    t.carb+=f.carb;
    t.fat+=f.fat;
  });

  total.innerHTML =
  `Kalori: ${t.cal} | Protein: ${t.protein}g | Carb: ${t.carb}g | Yağ: ${t.fat}g`;

  var percent = Math.min((t.cal/1800)*100,100);
  bar.style.width = percent+"%";
}

function renderFav() {
  favList.innerHTML="";
  favorites.forEach(f=>{
    var div=document.createElement("div");
    div.className="card";

    var span=document.createElement("span");
    span.textContent=f.name;
    span.style.cursor="pointer";
    span.onclick=()=>selectFav(f);

    var del=document.createElement("button");
    del.textContent="❌";
    del.className="del";
    del.onclick=()=>deleteFavorite(f.id);

    div.appendChild(span);
    div.appendChild(del);
    favList.appendChild(div);
  });
}

function renderHistory() {
  historyList.innerHTML="";
  for (let i=0;i<7;i++){
    let d=new Date();
    d.setDate(d.getDate()-i);
    let key=d.toISOString().slice(0,10);

    let data=JSON.parse(localStorage.getItem("foods_"+key)||"[]");

    if(data.length){
      var div=document.createElement("div");
      div.className="card";
      div.textContent=key+" ("+data.length+" öğe)";
      historyList.appendChild(div);
    }
  }
}

function renderAll() {
  renderFoods();
  renderTotal();
  renderFav();
  renderHistory();
}

renderAll();

</script>

</body>
</html>
