<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kalori Takip Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family: -apple-system;
  background:#111;
  color:#fff;
  padding:20px;
}
.card{
  background:#1c1c1e;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}
input,button,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}
button{
  background:#0a84ff;
  color:white;
}
.small-btn{
  width:auto;
  padding:5px 10px;
  margin-left:5px;
}
</style>
</head>

<body>

<h2>🔥 Kalori Takip Pro</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Yemek Ekle</h3>
<input id="food" placeholder="Yemek adı">
<input id="cal" type="number" placeholder="Kalori">
<input id="protein" type="number" placeholder="Protein">
<input id="carb" type="number" placeholder="Karbonhidrat">
<input id="fat" type="number" placeholder="Yağ">
<button onclick="addFood()">Ekle</button>
</div>

<div class="card">
<h3>⚡ Hızlı Ekle</h3>
<button onclick="quickAdd('Tavuk',200,40,0,5)">🍗 Tavuk</button>
<button onclick="quickAdd('Pirinç',300,5,65,1)">🍚 Pirinç</button>
<button onclick="quickAdd('Yumurta',150,12,1,10)">🥚 Yumurta</button>
<button onclick="quickAdd('Ton Balığı',180,35,0,2)">🐟 Ton Balığı</button>
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals"></p>
<p id="goalStatus"></p>
</div>

<div class="card">
<h3>OMAD Modu</h3>
<button onclick="toggleOMAD()">Aç / Kapat</button>
<p id="omadStatus"></p>
</div>

<div class="card">
<h3>Geçmiş</h3>
<select id="historySelect" onchange="loadDay()"></select>
</div>

<div class="card">
<ul id="list"></ul>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let todayDate = new Date().toISOString().split('T')[0];
today.innerText = "Bugün: " + todayDate;

let data = JSON.parse(localStorage.getItem("data")) || {};
let goal = localStorage.getItem("goal") || 1800;
let omad = JSON.parse(localStorage.getItem("omad")) || false;

let currentDay = todayDate;
if(!data[currentDay]) data[currentDay]=[];

function save(){
  localStorage.setItem("data", JSON.stringify(data));
  localStorage.setItem("omad", JSON.stringify(omad));
}

function addFood(){
  let item={
    name:food.value,
    cal:+cal.value,
    protein:+protein.value,
    carb:+carb.value,
    fat:+fat.value
  };
  data[currentDay].push(item);
  save();
  render();
}

function quickAdd(n,c,p,car,f){
  data[currentDay].push({name:n,cal:c,protein:p,carb:car,fat:f});
  save();
  render();
}

function deleteFood(i){
  data[currentDay].splice(i,1);
  save();
  render();
}

function editFood(i){
  let f=data[currentDay][i];
  let n=prompt("Ad:",f.name);
  let c=prompt("Kalori:",f.cal);
  if(n!==null){
    data[currentDay][i]={name:n,cal:+c,protein:f.protein,carb:f.carb,fat:f.fat};
    save();render();
  }
}

function toggleOMAD(){
  omad=!omad;
  save();
  render();
}

function loadDay(){
  currentDay=historySelect.value;
  render();
}

function render(){
  list.innerHTML="";
  let foods=data[currentDay];
  let cal=0,p=0,c=0,f=0;

  foods.forEach((x,i)=>{
    list.innerHTML+=`
    <li>
      ${x.name} (${x.cal} kcal)
      <button class="small-btn" onclick="editFood(${i})">✏️</button>
      <button class="small-btn" onclick="deleteFood(${i})">❌</button>
    </li>`;
    cal+=x.cal;p+=x.protein;c+=x.carb;f+=x.fat;
  });

  totals.innerHTML=`
  🔥 ${cal} kcal<br>
  🥩 ${p}g | 🍞 ${c}g | 🧈 ${f}g`;

  goalStatus.innerText=`Hedef: ${goal} | Kalan: ${goal-cal}`;

  omadStatus.innerText= omad ? "OMAD aktif (tek öğün)" : "Normal mod";

  updateHistory();
  drawChart(p,c,f);
}

function updateHistory(){
  historySelect.innerHTML="";
  Object.keys(data).forEach(d=>{
    historySelect.innerHTML+=`<option>${d}</option>`;
  });
  historySelect.value=currentDay;
}

function drawChart(p,c,f){
  new Chart(chart,{
    type:'doughnut',
    data:{
      labels:['Protein','Karbonhidrat','Yağ'],
      datasets:[{data:[p,c,f]}]
    }
  });
}

render();
</script>

</body>
</html>
