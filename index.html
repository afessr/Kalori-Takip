<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>OMAD Kalori Takip | Önerili</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f4f4f4;}
h2,h3{margin:5px 10px;}
.card{margin:10px;padding:12px;background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,0.2);}
input, select{margin:3px 0;padding:5px;border-radius:4px;border:1px solid #ccc;width:100%;box-sizing:border-box;}
button{margin:3px 0;padding:8px;border:none;border-radius:6px;background:#0a84ff;color:#fff;cursor:pointer;width:100%;}
button:hover{opacity:0.9;}
.total{font-weight:bold;padding:6px;border-radius:6px;color:#fff;text-align:center;}
.green{background:#34c759;}
.yellow{background:#ffcc00;color:#000;}
.red{background:#ff3b30;}
.mini-bar{height:6px;width:100%;border-radius:3px;margin:2px 0;}
.suggestions{border:1px solid #ccc;background:#fff;max-height:120px;overflow-y:auto;position:absolute;width:calc(100% - 26px);z-index:100;}
.suggestions div{padding:4px;cursor:pointer;}
.suggestions div:hover{background:#0a84ff;color:#fff;}
.relative{position:relative;}
</style>
</head>
<body>

<h2>🔥 OMAD Kalori Takip | Önerili</h2>
<h3 id="today"></h3>

<div class="card">
<h3>Tek Öğün Girişi</h3>
<div class="relative">
  <label>Yemek Adı</label>
  <input id="mealName" placeholder="Örn: Tavuk + Pirinç" oninput="showSuggestions()">
  <div id="suggestions" class="suggestions"></div>
</div>
<div>
  <label>Gram (100g baz)</label>
  <input type="number" id="mealGram" value="100" oninput="autoFill()">
</div>
<div>
  <label>Kalori</label>
  <input type="number" id="mealCal" value="0">
</div>
<div>
  <label>Protein</label>
  <input type="number" id="mealProt" value="0">
</div>
<div>
  <label>Karbonhidrat</label>
  <input type="number" id="mealCarb" value="0">
</div>
<div>
  <label>Yağ</label>
  <input type="number" id="mealFat" value="0">
</div>
<div>
  <label>Porsiyon</label>
  <select id="mealPortion">
    <option value="0.25">0.25x</option>
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="1.5">1.5x</option>
    <option value="2">2x</option>
  </select>
</div>
<button onclick="addMeal()">➕ Ekle</button>
<div id="miniBars"></div>
</div>

<div class="card">
<h3>Toplam</h3>
<p id="totals" class="total"></p>
</div>

<div class="card">
<h3>Günlük Grafik</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Haftalık Grafik</h3>
<canvas id="weeklyChart"></canvas>
</div>

<script>
let todayDate = new Date().toISOString().split('T')[0];
document.getElementById("today").innerText = "Bugün: " + todayDate;
let currentDay = todayDate;
let data = JSON.parse(localStorage.getItem("data")) || {};
if(!data[currentDay]) data[currentDay]=[];
let goal = 1800;

// Önceden tanımlı yemek listesi
let mealsDB=[
  {name:"Tavuk + Pirinç",cal:200,protein:16,carb:20,fat:4},
  {name:"Ton Balığı Salata",cal:175,protein:17.5,carb:5,fat:7.5},
  {name:"Yumurta + Lor",cal:150,protein:12.5,carb:2.5,fat:7.5},
  {name:"Lor Peynirli Sandviç",cal:200,protein:15,carb:17.5,fat:6},
  {name:"Badem + Yoğurt",cal:125,protein:7.5,carb:5,fat:9},
];

function save(){ localStorage.setItem("data",JSON.stringify(data)); }

function showSuggestions(){
  let input=document.getElementById("mealName").value.toLowerCase();
  let suggestions=document.getElementById("suggestions");
  suggestions.innerHTML="";
  if(!input) return;
  mealsDB.forEach(m=>{
    if(m.name.toLowerCase().includes(input)){
      let div=document.createElement("div");
      div.innerText=m.name;
      div.onclick=()=>{document.getElementById("mealName").value=m.name; suggestions.innerHTML=""; autoFill();};
      suggestions.appendChild(div);
    }
  });
  autoFill();
}

function autoFill(){
  let name=document.getElementById("mealName").value.toLowerCase();
  let gram=+document.getElementById("mealGram").value||100;
  let meal = mealsDB.find(m=>m.name.toLowerCase()===name);
  if(meal){
    document.getElementById("mealCal").value=(meal.cal*gram/100).toFixed(1);
    document.getElementById("mealProt").value=(meal.protein*gram/100).toFixed(1);
    document.getElementById("mealCarb").value=(meal.carb*gram/100).toFixed(1);
    document.getElementById("mealFat").value=(meal.fat*gram/100).toFixed(1);
  }
}

function updateTotals(){
  if(!data[currentDay]) data[currentDay]=[];
  let totalCal=0,totalProt=0,totalCarb=0,totalFat=0;
  data[currentDay].forEach(item=>{
    totalCal+=item.cal;
    totalProt+=item.protein;
    totalCarb+=item.carb;
    totalFat+=item.fat;
  });

  let totalElem = document.getElementById("totals");
  totalElem.innerText = `Kalori: ${totalCal.toFixed(1)} kcal | Protein: ${totalProt.toFixed(1)} g | Karbonhidrat: ${totalCarb.toFixed(1)} g | Yağ: ${totalFat.toFixed(1)} g`;

  if(totalCal<goal) totalElem.className="total green";
  else if(totalCal>goal) totalElem.className="total red";
  else totalElem.className="total yellow";

  let ctx = document.getElementById("chart").getContext("2d");
  if(window.dailyChart) window.dailyChart.destroy();
  window.dailyChart=new Chart(ctx,{type:'bar',data:{labels:['Kalori','Protein','Karbonhidrat','Yağ'],datasets:[{label:'Bugün',data:[totalCal,totalProt,totalCarb,totalFat],backgroundColor:['#0a84ff','#34c759','#ff9500','#ff3b30']}]},options:{responsive:true,plugins:{legend:{display:false}}}});

  let weekLabels=[],weekData=[];
  for(let i=6;i>=0;i--){
    let d=new Date();
    d.setDate(d.getDate()-i);
    let ds=d.toISOString().split('T')[0];
    weekLabels.push(ds.slice(5));
    if(!data[ds]) data[ds]=[];
    let c=0; data[ds].forEach(item=>c+=item.cal); weekData.push(c);
  }
  let wCtx=document.getElementById("weeklyChart").getContext("2d");
  if(window.weekChart) window.weekChart.destroy();
  window.weekChart=new Chart(wCtx,{type:'line',data:{labels:weekLabels,datasets:[{label:'Haftalık Kalori',data:weekData,borderColor:'#0a84ff',backgroundColor:'rgba(10,132,255,0.2)',fill:true}]},options:{responsive:true}});
}

function addMeal(){
  let name=document.getElementById("mealName").value||"Öğün";
  let cal=+document.getElementById("mealCal").value||0;
  let protein=+document.getElementById("mealProt").value||0;
  let carb=+document.getElementById("mealCarb").value||0;
  let fat=+document.getElementById("mealFat").value||0;
  let portion=+document.getElementById("mealPortion").value||1;
  let factor=portion;
  data[currentDay].push({name,cal:cal*factor,protein:protein*factor,carb:carb*factor,fat:fat*factor});
  save();
  updateTotals();
}

updateTotals();
</script>
</body>
</html>
